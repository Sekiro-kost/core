name: Generate draft release notes

on:
  push:
    branches:
      - develop
      - feat/changelog-develop
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-notes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get last tag
        id: lasttag
        run: |
          TAG=$(git describe --tags --abbrev=0)
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Get tag date
        id: tagdate
        run: |
          DATE=$(git log -1 --format=%cI ${{ steps.lasttag.outputs.tag }})
          echo "date=$DATE" >> $GITHUB_OUTPUT

      - name: Generate markdown file
        id: genmd
        run: |
          mkdir -p docs

          echo "# All changes since release ${{ steps.lasttag.outputs.tag }}" > docs/release-notes.md
          echo "" >> docs/release-notes.md
          PRS_JSON=$(gh pr list \
            --state merged \
            --base develop \
            --search "merged:>${{ steps.tagdate.outputs.date }}" \
            --json number,title,mergedAt,url,labels)

          echo "## New features" >> docs/release-notes.md
          FEAT_ROWS=$(echo "$PRS_JSON" | jq -r '
            map(select((.title | startswith("[CI]")) | not))
            | map(select(any(.labels[]?; (.name | ascii_downcase) == "changelog-feat")))
            | sort_by(.mergedAt) | reverse | .[]
            | "| \(.mergedAt | fromdateiso8601 | strflocaltime("%Y-%m-%d %H:%M:%S")) | \(.title | gsub("\\|"; "\\\\|")) | [#\(.number)](\(.url)) |"
          ')
          if [ -z "$FEAT_ROWS" ]; then
            echo "no entries" >> docs/release-notes.md
          else
            echo "| Merge date | Title | PR |" >> docs/release-notes.md
            echo "| --- | --- | --- |" >> docs/release-notes.md
            echo "$FEAT_ROWS" >> docs/release-notes.md
          fi
          echo "" >> docs/release-notes.md

          echo "## Fixes" >> docs/release-notes.md
          FIX_ROWS=$(echo "$PRS_JSON" | jq -r '
            map(select((.title | startswith("[CI]")) | not))
            | map(select(any(.labels[]?; (.name | ascii_downcase) == "changelog-fix")))
            | sort_by(.mergedAt) | reverse | .[]
            | "| \(.mergedAt | fromdateiso8601 | strflocaltime("%Y-%m-%d %H:%M:%S")) | \(.title | gsub("\\|"; "\\\\|")) | [#\(.number)](\(.url)) |"
          ')
          if [ -z "$FIX_ROWS" ]; then
            echo "no entries" >> docs/release-notes.md
          else
            echo "| Merge date | Title | PR |" >> docs/release-notes.md
            echo "| --- | --- | --- |" >> docs/release-notes.md
            echo "$FIX_ROWS" >> docs/release-notes.md
          fi
          echo "" >> docs/release-notes.md

          echo "## Others" >> docs/release-notes.md
          OTHERS_ROWS=$(echo "$PRS_JSON" | jq -r '
            map(select((.title | startswith("[CI]")) | not))
            | map(select(any(.labels[]?; (.name | ascii_downcase) == "changelog-other")))
            | sort_by(.mergedAt) | reverse | .[]
            | "| \(.mergedAt | fromdateiso8601 | strflocaltime("%Y-%m-%d %H:%M:%S")) | \(.title | gsub("\\|"; "\\\\|")) | [#\(.number)](\(.url)) |"
          ')
          if [ -z "$OTHERS_ROWS" ]; then
            echo "no entries" >> docs/release-notes.md
          else
            echo "| Merge date | Title | PR |" >> docs/release-notes.md
            echo "| --- | --- | --- |" >> docs/release-notes.md
            echo "$OTHERS_ROWS" >> docs/release-notes.md
          fi
          echo "" >> docs/release-notes.md

          echo "## Documentations" >> docs/release-notes.md
          DOCS_ROWS=$(echo "$PRS_JSON" | jq -r '
            map(select((.title | startswith("[CI]")) | not))
            | map(select(any(.labels[]?; (.name | ascii_downcase) == "changelog-docs")))
            | sort_by(.mergedAt) | reverse | .[]
            | "| \(.mergedAt | fromdateiso8601 | strflocaltime("%Y-%m-%d %H:%M:%S")) | \(.title | gsub("\\|"; "\\\\|")) | [#\(.number)](\(.url)) |"
          ')
          if [ -z "$DOCS_ROWS" ]; then
            echo "no entries" >> docs/release-notes.md
          else
            echo "| Merge date | Title | PR |" >> docs/release-notes.md
            echo "| --- | --- | --- |" >> docs/release-notes.md
            echo "$DOCS_ROWS" >> docs/release-notes.md
          fi
          echo "" >> docs/release-notes.md

          echo "## Developer" >> docs/release-notes.md
          DEV_ROWS=$(echo "$PRS_JSON" | jq -r '
            map(select((.title | startswith("[CI]")) | not))
            | map(select(any(.labels[]?; (.name | ascii_downcase) == "changelog-dev")))
            | sort_by(.mergedAt) | reverse | .[]
            | "| \(.mergedAt | fromdateiso8601 | strflocaltime("%Y-%m-%d %H:%M:%S")) | \(.title | gsub("\\|"; "\\\\|")) | [#\(.number)](\(.url)) |"
          ')
          if [ -z "$DEV_ROWS" ]; then
            echo "no entries" >> docs/release-notes.md
          else
            echo "| Merge date | Title | PR |" >> docs/release-notes.md
            echo "| --- | --- | --- |" >> docs/release-notes.md
            echo "$DEV_ROWS" >> docs/release-notes.md
          fi

        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TZ: Europe/Paris

      - name: Commit markdown file
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add docs/release-notes.md

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update release-notes.md [skip ci]"
          git push